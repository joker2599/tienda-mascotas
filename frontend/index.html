<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    
    <title>Tienda de Mascotas</title>

    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: lightblue;
        }
        #productos .card {
            overflow: hidden;
        }
        
        #productos .card .producto-thumb {
            position: relative;
            width: 100%;
            aspect-ratio: 4 / 3;
            overflow: hidden;
            background-color: #dee2e6;
            border-top-left-radius: var(--bs-card-inner-border-radius);
            border-top-right-radius: var(--bs-card-inner-border-radius);
        }
        #productos .card .producto-thumb img {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: center;
        }
        #productos .card .producto-thumb .btn-fav {
            z-index: 2;
            font-size: 1.35rem;
            line-height: 1;
            padding: 0.4rem 0.55rem;
        }
    </style>
</head>

<body>
    <div class="container-fluid px-3 py-2">
        <div class="d-flex justify-content-between align-items-center flex-wrap gap-2">
            <a href="contacto.html" class="text-decoration-none">Contacto</a>
            <div class="text-end">
                <a href="favoritos.html" class="text-decoration-none me-3 fs-5 fw-semibold link-dark">❤️ Favoritos (<span id="contador-fav">0</span>)</a>
                <span>🛒 Carrito: <span id="contador">0</span></span>
            </div>
        </div>
    </div>

<div class="container mt-4">
    <div class="d-flex justify-content-end flex-wrap gap-2 mb-2">
        <a href="favoritos.html" class="btn btn-outline-danger btn-sm">❤️ Favoritos</a>
        <a href="carrito.html" class="btn btn-success">🛒 Ver carrito</a>
    </div>
    <h1 class="text-center">🙊 Tienda de Mascotas</h1>
    <div class="row" id="productos"></div>
</div>

<script src="js/favoritos.js"></script>
<script src="js/app.js"></script>
</body>
</html>
